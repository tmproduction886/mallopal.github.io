  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    var Q = (function() {
      var data = null;
      var current = 0;
      var answers = {};
      var appUrl = 'https://apps.apple.com/us/app/mallo-ai-companion-remembers/id6757778766?utm_source=quiz&utm_medium=web&utm_campaign=tools';

      function show(stepId) {
        document.querySelectorAll('.quiz-step').forEach(function(el) { el.classList.remove('active'); });
        var el = document.getElementById(stepId);
        if (el) el.classList.add('active');
      }

      function getResultId(score) {
        if (score >= 8) return 'strong_fit';
        if (score >= 5) return 'good_fit';
        return 'curious';
      }

      function renderQuestions() {
        var container = document.getElementById('quiz-questions');
        if (!data || !container) return;
        var html = '';
        data.questions.forEach(function(q, i) {
          html += '<div class="quiz-step' + (i === 0 ? ' active' : '') + '" data-q="' + i + '">';
          html += '<p class="quiz-q">' + escapeHtml(q.text) + '</p>';
          html += '<div class="quiz-options" role="group" aria-label="Choose one">';
          q.options.forEach(function(opt) {
            html += '<button type="button" class="quiz-opt" data-value="' + escapeHtml(opt.value) + '" aria-pressed="false">' + escapeHtml(opt.label) + '</button>';
          });
          html += '</div>';
          html += '<div class="quiz-nav">';
          if (i > 0) html += '<button type="button" class="btn btn-secondary" data-prev>Back</button>';
          html += '<button type="button" class="btn btn-primary" data-next style="' + (i === 0 ? '' : 'display:none') + '">Next</button>';
          html += '</div></div>';
        });
        container.innerHTML = html;

        container.querySelectorAll('.quiz-opt').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var step = btn.closest('[data-q]');
            var qIndex = parseInt(step.dataset.q, 10);
            var val = btn.dataset.value;
            data.questions[qIndex].options.forEach(function(o) {
              if (o.value === val) answers['q' + (qIndex + 1)] = val;
            });
            step.querySelectorAll('.quiz-opt').forEach(function(b) { b.setAttribute('aria-pressed', 'false'); });
            btn.setAttribute('aria-pressed', 'true');
            step.querySelector('[data-next]').style.display = 'inline-block';
          });
        });

        container.querySelectorAll('[data-next]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var step = btn.closest('[data-q]');
            var qIndex = parseInt(step.dataset.q, 10);
            if (qIndex < data.questions.length - 1) {
              step.classList.remove('active');
              container.querySelector('[data-q="' + (qIndex + 1) + '"]').classList.add('active');
            } else {
              var score = 0;
              for (var k in answers) score += (data.scoring[answers[k]] || 0);
              var resultId = getResultId(score);
              renderResult(resultId);
              show('quiz-result');
              if (typeof gtag === 'function') gtag('event', 'quiz_complete', { event_category: 'tools', event_label: resultId });
              var url = window.location.pathname + '?result=' + resultId;
              if (window.history && window.history.replaceState) window.history.replaceState({}, '', url);
            }
          });
        });

        container.querySelectorAll('[data-prev]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var step = btn.closest('[data-q]');
            var qIndex = parseInt(step.dataset.q, 10);
            step.classList.remove('active');
            container.querySelector('[data-q="' + (qIndex - 1) + '"]').classList.add('active');
          });
        });
      }

      function renderResult(resultId) {
        var res = data.results.find(function(r) { return r.id === resultId; });
        if (!res) return;
        var container = document.getElementById('quiz-result');
        var body = (res.body || '').replace(/\n\n/g, '\n');
        var shareUrl = 'https://mallopal.com/tools/quiz.html?result=' + resultId;
        container.innerHTML =
          '<div class="quiz-result">' +
          '<h2>' + escapeHtml(res.headline) + '</h2>' +
          '<p class="body">' + escapeHtml(body) + '</p>' +
          (res.tip ? '<p class="tip">' + escapeHtml(res.tip) + '</p>' : '') +
          '<div class="share-bar">' +
          '<button type="button" id="share-copy">Copy my result link</button>' +
          '<a href="https://twitter.com/intent/tweet?text=' + encodeURIComponent(res.shareText || res.headline) + '&url=' + encodeURIComponent(shareUrl) + '" target="_blank" rel="noopener">Share on X</a>' +
          '</div>' +
          '<div class="tool-cta">' +
          '<h3>' + escapeHtml(data.meta.ctaHeadline) + '</h3>' +
          '<p>' + escapeHtml(res.ctaEmphasis) + ' ' + escapeHtml(data.meta.ctaSubline) + '</p>' +
          '<a href="' + appUrl + '" class="btn" rel="noopener noreferrer" target="_blank">' + escapeHtml(data.meta.ctaButton) + '</a>' +
          '</div></div>';
        document.getElementById('share-copy').addEventListener('click', function() {
          navigator.clipboard.writeText(shareUrl).then(function() {
            this.textContent = 'Copied!';
          }.bind(this));
        });
      }

      function escapeHtml(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function init() {
        var params = new URLSearchParams(window.location.search);
        var resultParam = params.get('result');
        if (resultParam && (resultParam === 'strong_fit' || resultParam === 'good_fit' || resultParam === 'curious')) {
          fetch('quiz-is-ai-companion-right-for-you.json').then(function(r) { return r.json(); }).then(function(d) {
            data = d;
            renderResult(resultParam);
            show('quiz-result');
          }).catch(function() { show('quiz-intro'); });
          return;
        }
        fetch('quiz-is-ai-companion-right-for-you.json').then(function(r) { return r.json(); }).then(function(d) {
          data = d;
          renderQuestions();
          document.getElementById('quiz-start').addEventListener('click', function() {
            show('quiz-questions');
          });
        }).catch(function() {
          document.getElementById('quiz-intro').innerHTML = '<p>Unable to load the quiz. <a href="../#tools">Back to free tools</a>.</p>';
        });
      }

      return { init: init };
    })();
    Q.init();
  </script>
