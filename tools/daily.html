      </header>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    (function() {
      var start = new Date(new Date().getFullYear(), 0, 0);
      var diff = (new Date() - start) + (start.getTimezoneOffset() * 60000);
      var dayOfYear = Math.floor(diff / 86400000);
      var index = dayOfYear % 15;

      fetch('daily-check-in-questions.json').then(function(r) { return r.json(); }).then(function(d) {
        var q = d.questions[index];
        if (!q) q = d.questions[0];
        document.getElementById('daily-question-block').innerHTML = '<div class="daily-q" role="heading" aria-level="2">' + escapeHtml(q.question) + '</div><button type="button" class="btn btn-primary" id="show-response">See a thought</button>';
        document.getElementById('daily-response-block').innerHTML = '<div class="daily-response">' + escapeHtml(q.response) + '</div>';
        document.getElementById('daily-cta-block').innerHTML = '<h3>' + escapeHtml(d.meta.ctaHeadline) + '</h3><p>' + escapeHtml(d.meta.ctaBody) + '</p><a href="https://apps.apple.com/us/app/mallo-ai-companion-remembers/id6757778766?utm_source=daily&utm_medium=web&utm_campaign=tools" class="btn" rel="noopener noreferrer" target="_blank">' + escapeHtml(d.meta.ctaButton) + '</a>';
        document.getElementById('show-response').addEventListener('click', function() {
          this.style.display = 'none';
          document.getElementById('daily-response-block').style.display = 'block';
          document.getElementById('daily-cta-block').style.display = 'block';
        });
      }).catch(function() {
        document.getElementById('daily-question-block').innerHTML = '<p>Unable to load today\'s question. <a href="../#tools">Back to free tools</a>.</p>';
      });

      function escapeHtml(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }
    })();
  </script>
